">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br></pre></td><td class="code"><pre><span class="line"><span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="string">    异步函数版本</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">    2024.8.15 文件加密 ----&gt; 或者采用了其他的编码</span></span><br><span class="line"><span class="string">&quot;&quot;&quot;</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> re</span><br><span class="line"><span class="keyword">import</span> os</span><br><span class="line"><span class="keyword">import</span> time</span><br><span class="line"><span class="keyword">import</span> asyncio</span><br><span class="line"><span class="keyword">import</span> aiohttp</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> requests</span><br><span class="line"></span><br><span class="line"><span class="keyword">from</span> lxml <span class="keyword">import</span> etree</span><br><span class="line"></span><br><span class="line">headers = &#123;</span><br><span class="line">    <span class="string">&quot;User-Agent&quot;</span>: <span class="string">&quot;Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/127.0.0.0 Safari/537.36&quot;</span>,</span><br><span class="line">    <span class="string">&quot;referer&quot;</span>: <span class="string">&quot;https://www.9tata.cc/&quot;</span></span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">async</span> <span class="keyword">def</span> <span class="title function_">get_first_m3u8_link_name</span>():</span><br><span class="line">    url = <span class="string">&quot;https://www.9tata.cc/play/14999-1-0.html&quot;</span></span><br><span class="line">    <span class="keyword">async</span> <span class="keyword">with</span> aiohttp.ClientSession() <span class="keyword">as</span> session:</span><br><span class="line">        <span class="keyword">async</span> <span class="keyword">with</span> session.get(url,headers=headers,ssl=<span class="literal">False</span>) <span class="keyword">as</span> response:</span><br><span class="line">            tree = etree.HTML(<span class="keyword">await</span> response.text())</span><br><span class="line">            <span class="comment"># 获取name</span></span><br><span class="line">            name = tree.xpath(<span class="string">&quot;/html/body/div[2]/div[1]/h2/a[2]/text()&quot;</span>)[<span class="number">0</span>]</span><br><span class="line">            <span class="built_in">print</span>(name)</span><br><span class="line"></span><br><span class="line">            <span class="comment"># 获取m3u8实例</span></span><br><span class="line">            m38u = tree.xpath(<span class="string">&#x27;//*[@id=&quot;cms_player&quot;]/script[1]/text()&#x27;</span>)[<span class="number">0</span>]</span><br><span class="line">            <span class="comment"># print(m38u)</span></span><br><span class="line">            first_m3u8_link = re.findall(<span class="string">&#x27;now=&quot;(.*?m3u8)&quot;&#x27;</span>, m38u)[<span class="number">0</span>]</span><br><span class="line">            <span class="built_in">print</span>(first_m3u8_link)</span><br><span class="line">            <span class="keyword">return</span> first_m3u8_link,name</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">async</span> <span class="keyword">def</span> <span class="title function_">get_second_m3u8_link</span>(<span class="params">first_m3u8_link</span>):</span><br><span class="line">    <span class="keyword">async</span> <span class="keyword">with</span> aiohttp.ClientSession() <span class="keyword">as</span> session:</span><br><span class="line">        <span class="keyword">async</span> <span class="keyword">with</span> session.get(first_m3u8_link,ssl=<span class="literal">False</span>,headers=headers) <span class="keyword">as</span> res:</span><br><span class="line">            data = <span class="keyword">await</span> res.text()</span><br><span class="line">            <span class="comment"># split的模块有些问题提取不出来,还得用正则表达式</span></span><br><span class="line">            next_url = <span class="string">&quot;https://s1.fsvod1.com&quot;</span> + re.findall(<span class="string">&#x27;(/.*?m3u8)&#x27;</span>, data)[<span class="number">0</span>]</span><br><span class="line"></span><br><span class="line">            <span class="keyword">return</span> next_url</span><br><span class="line"></span><br><span class="line"><span class="comment"># 解析ts文件</span></span><br><span class="line"><span class="keyword">async</span> <span class="keyword">def</span> <span class="title function_">parse_ts</span>(<span class="params">second_m3u8_link</span>):</span><br><span class="line">    <span class="keyword">async</span> <span class="keyword">with</span> aiohttp.ClientSession() <span class="keyword">as</span> session:</span><br><span class="line">        <span class="keyword">async</span> <span class="keyword">with</span> session.get(second_m3u8_link,ssl=<span class="literal">False</span>,headers=headers) <span class="keyword">as</span> res:</span><br><span class="line">            data = <span class="keyword">await</span> res.text()</span><br><span class="line"></span><br><span class="line">            <span class="comment"># 定义正则表达式模式</span></span><br><span class="line">            pattern = re.<span class="built_in">compile</span>(<span class="string">r&#x27;^.*/([^\n/]+\.ts)$&#x27;</span>, re.MULTILINE)</span><br><span class="line"></span><br><span class="line">            <span class="comment"># 执行替换操作</span></span><br><span class="line">            new_text = pattern.sub(<span class="string">r&#x27;\1&#x27;</span>,data)</span><br><span class="line"></span><br><span class="line">            <span class="keyword">with</span> <span class="built_in">open</span>(<span class="string">&quot;./ts/index.m3u8&quot;</span>,<span class="string">&quot;w&quot;</span>)<span class="keyword">as</span> f:</span><br><span class="line">                f.write(new_text)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">            ret = re.findall(<span class="string">r&quot;\n(.*?\.ts)&quot;</span>,data)</span><br><span class="line">            <span class="keyword">return</span> ret</span><br><span class="line"></span><br><span class="line"><span class="comment"># 主要的耗时步骤</span></span><br><span class="line"><span class="keyword">async</span> <span class="keyword">def</span> <span class="title function_">download_ts</span>(<span class="params">p,ts</span>):</span><br><span class="line">    <span class="comment"># 下载一个ts文件</span></span><br><span class="line">    name = <span class="string">&quot;./ts/&quot;</span>+ts.split(<span class="string">&#x27;/&#x27;</span>)[-<span class="number">1</span>]</span><br><span class="line">    <span class="keyword">async</span> <span class="keyword">with</span> aiohttp.ClientSession() <span class="keyword">as</span> session:</span><br><span class="line">        <span class="built_in">print</span>(p+ts,<span class="string">&quot;开始下载&quot;</span>)</span><br><span class="line">        <span class="keyword">async</span> <span class="keyword">with</span> session.get(p+ts,ssl=<span class="literal">False</span>,headers=headers) <span class="keyword">as</span> res:</span><br><span class="line">            <span class="keyword">with</span> <span class="built_in">open</span>(name, <span class="string">&quot;wb&quot;</span>) <span class="keyword">as</span> f:</span><br><span class="line">                <span class="comment"># 避免 打开文件然后一顿操作,会降低运行速度</span></span><br><span class="line">                f.write(<span class="keyword">await</span> res.content.read())</span><br><span class="line">            <span class="built_in">print</span>(<span class="string">f&quot;<span class="subst">&#123;ts&#125;</span>下载完成!&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="keyword">async</span> <span class="keyword">def</span> <span class="title function_">main</span>():</span><br><span class="line">    <span class="comment"># 1. 爬取</span></span><br><span class="line">    first_m3u8_link,name = <span class="keyword">await</span> get_first_m3u8_link_name()</span><br><span class="line">    <span class="comment"># 2. 获取第二个m3u8链接</span></span><br><span class="line">    second_m3u8_link= <span class="keyword">await</span> get_second_m3u8_link(first_m3u8_link)</span><br><span class="line">    <span class="comment"># 3. 解析ts文件</span></span><br><span class="line">    ts_list = <span class="keyword">await</span> parse_ts(second_m3u8_link)</span><br><span class="line">    <span class="comment"># 4. 下载</span></span><br><span class="line">    <span class="built_in">print</span>(ts_list)</span><br><span class="line">    <span class="built_in">print</span>(<span class="built_in">len</span>(ts_list))  <span class="comment"># 384</span></span><br><span class="line">    p = <span class="string">&quot;https://s1.fsvod1.com&quot;</span></span><br><span class="line">    tasks = [asyncio.create_task(download_ts(p,ts)) <span class="keyword">for</span> ts <span class="keyword">in</span> ts_list]</span><br><span class="line">    result = <span class="keyword">await</span> asyncio.gather(*tasks)</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">&#x27;__main__&#x27;</span>:</span><br><span class="line">    start = time.time()</span><br><span class="line">    asyncio.run(main())</span><br><span class="line">    end = time.time()</span><br><span class="line">    <span class="built_in">print</span>(<span class="string">f&quot;cost:&quot;</span>,end-start)  <span class="comment">#  cost: 21.449084281921387  # 459个文件</span></span><br><span class="line"></span><br></pre></td></tr></table></figure>

  <script type="text/javascript">
  $(function() {
    // copy-btn HTML
    var btn = "<span class=\"btn-copy tooltipped tooltipped-sw\" aria-label=\"复制到粘贴板！\">";
    btn += '<i class="fa-regular fa-clone"></i>';
    btn += '</span>';
    // mount it!
    $(".highlight table").before(btn);
    var clip = new ClipboardJS('.btn-copy', {
      text: function(trigger) {
        return Array.from(trigger.nextElementSibling.querySelectorAll('.code')).reduce((str,it)=>str+it.innerText+'\n','')
      }
    });
    clip.on('success', function(e) {
      e.trigger.setAttribute('aria-label', "复制成功！");
      e.clearSelection();
    })
  })
  </script>
