 <span class="keyword">in</span> items:</span><br><span class="line">        book_name = item.get(<span class="string">&quot;bookName&quot;</span>)</span><br><span class="line">        book_id = item.get(<span class="string">&quot;bookId&quot;</span>)</span><br><span class="line">        data = &#123;</span><br><span class="line">            <span class="string">&quot;bookName&quot;</span>: book_name,</span><br><span class="line">            <span class="string">&quot;bookId&quot;</span>: book_id,</span><br><span class="line">        &#125;</span><br><span class="line">        book_data.append(data)</span><br><span class="line">        <span class="keyword">return</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 用bookId来访问对应的页面</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">use_booId_get_html</span>():</span><br><span class="line">    <span class="keyword">for</span> data <span class="keyword">in</span> book_data:</span><br><span class="line">        book_id = data[<span class="string">&quot;bookId&quot;</span>]</span><br><span class="line">        url = <span class="string">f&quot;https://www.17k.com/list/<span class="subst">&#123;book_id&#125;</span>.html&quot;</span></span><br><span class="line">        <span class="comment"># 延时</span></span><br><span class="line">        rep = session.get(url, headers=header)</span><br><span class="line">        tree = etree.HTML(rep.text)</span><br><span class="line">        get_chapter_data(tree)</span><br><span class="line">        time.sleep(<span class="number">2</span>)</span><br><span class="line">        <span class="keyword">return</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">book_chapter_data = []</span><br><span class="line"><span class="comment"># 解析每个章节对应的url</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">get_chapter_data</span>(<span class="params">tree</span>):</span><br><span class="line">    a_items = tree.xpath(<span class="string">&quot;/html/body/div[5]/dl[1]/dd//a[position()&lt;16]&quot;</span>)</span><br><span class="line">    <span class="keyword">for</span> a_item <span class="keyword">in</span> a_items:</span><br><span class="line">        href = <span class="string">&quot;https://www.17k.com&quot;</span> + a_item.xpath(<span class="string">&quot;@href&quot;</span>)[<span class="number">0</span>]</span><br><span class="line">        book_chapter_data.append(href)</span><br><span class="line">        <span class="built_in">print</span>(href)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line">download_data = []</span><br><span class="line"><span class="comment"># 解析每个章节的内容</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">get_chapter_title_text</span>():</span><br><span class="line">    <span class="keyword">for</span> href <span class="keyword">in</span> book_chapter_data:</span><br><span class="line">        <span class="comment"># 每次停留3s再去爬取</span></span><br><span class="line">        time.sleep(<span class="number">3</span>)</span><br><span class="line">        res = session.get(href, headers=header)</span><br><span class="line">        res.encoding = <span class="string">&quot;utf8&quot;</span></span><br><span class="line">        tree = etree.HTML(res.content.decode(<span class="string">&quot;utf-8&quot;</span>))</span><br><span class="line">        title = tree.xpath(<span class="string">&#x27;//*[@id=&quot;readArea&quot;]/div[1]/h1/text()&#x27;</span>)[<span class="number">0</span>]</span><br><span class="line">        <span class="built_in">print</span>(title)</span><br><span class="line">        p_items = tree.xpath(<span class="string">&#x27;//*[@id=&quot;readArea&quot;]/div[1]/div[2]//p&#x27;</span>)</span><br><span class="line">        <span class="comment"># print(p_items)</span></span><br><span class="line">        <span class="comment"># 清空</span></span><br><span class="line">        total_data = <span class="string">&#x27;&#x27;</span></span><br><span class="line">        <span class="keyword">for</span> p_item <span class="keyword">in</span> p_items:</span><br><span class="line">            total_data += p_item.xpath(<span class="string">&#x27;text()&#x27;</span>)[<span class="number">0</span>]+<span class="string">&quot;/n&quot;</span></span><br><span class="line">        <span class="comment"># 内容乱码,需要js逆向</span></span><br><span class="line">        data = &#123;</span><br><span class="line">            <span class="string">&quot;title&quot;</span>: title,</span><br><span class="line">            <span class="string">&quot;text&quot;</span>: total_data</span><br><span class="line">        &#125;</span><br><span class="line">        download_data.append(data)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 持久化存储</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">save_book_data</span>():</span><br><span class="line">    i = <span class="number">1</span></span><br><span class="line">    <span class="keyword">for</span> data <span class="keyword">in</span> download_data:</span><br><span class="line">        title = data[<span class="string">&quot;title&quot;</span>]</span><br><span class="line">        text = data[<span class="string">&quot;text&quot;</span>]</span><br><span class="line">        datas = text.split(<span class="string">&quot;/n&quot;</span>)</span><br><span class="line">        <span class="keyword">with</span> <span class="built_in">open</span>(<span class="string">f&quot;./book/<span class="subst">&#123;i&#125;</span> <span class="subst">&#123;title&#125;</span>.txt&quot;</span>, <span class="string">&quot;w&quot;</span>, encoding=<span class="string">&quot;utf8&quot;</span>)<span class="keyword">as</span> f:</span><br><span class="line">            f.write(<span class="string">f&quot;<span class="subst">&#123;title&#125;</span>\n&quot;</span>)</span><br><span class="line">            <span class="keyword">for</span> word <span class="keyword">in</span> datas:</span><br><span class="line">                f.write(<span class="string">&quot;&#123;&#125;\n&quot;</span>.<span class="built_in">format</span>(word))</span><br><span class="line">        i += <span class="number">1</span></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">&#x27;__main__&#x27;</span>:</span><br><span class="line">    <span class="comment"># 1. 获取收藏栏数据</span></span><br><span class="line">    get_json_data()</span><br><span class="line">    <span class="comment"># 2. 挨个解析数据</span></span><br><span class="line">    use_booId_get_html()</span><br><span class="line">    <span class="comment"># 3. 访问具体的网页去获取具体的小说数据</span></span><br><span class="line">    get_chapter_title_text()</span><br><span class="line">    <span class="comment"># 4. 持久化存储</span></span><br><span class="line">    save_book_data()</span><br></pre></td></tr></table></figure>
