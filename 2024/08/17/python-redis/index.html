s="line"><span class="string">数字       --》  int  float</span></span><br><span class="line"><span class="string">列表       --&gt;   列表</span></span><br><span class="line"><span class="string">字符串      --》  字节串</span></span><br><span class="line"><span class="string">哈希       --&gt;   字典</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">&quot;&quot;&quot;</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> redis</span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27; 通 用 类 型  &#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="comment"># 通用指令</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">generic</span>():</span><br><span class="line">    <span class="comment"># 通用指令</span></span><br><span class="line">    res = r.keys(<span class="string">&quot;*&quot;</span>)</span><br><span class="line">    <span class="built_in">print</span>(res)</span><br><span class="line">    <span class="built_in">print</span>(r.exists(<span class="string">&quot;name&quot;</span>))</span><br><span class="line">    r.delete(<span class="string">&quot;sset&quot;</span>)</span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27; 字 符 串 &#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="comment"># 字符串指令</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">string</span>():</span><br><span class="line">    r.<span class="built_in">set</span>(<span class="string">&quot;name&quot;</span>, <span class="string">&quot;zhaoliying&quot;</span>)</span><br><span class="line">    res = r.get(<span class="string">&quot;name&quot;</span>)</span><br><span class="line">    <span class="built_in">print</span>(res.decode())</span><br><span class="line">    r.mset(&#123;<span class="string">&quot;a&quot;</span>: <span class="number">1</span>, <span class="string">&#x27;b&#x27;</span>: <span class="number">2</span>&#125;)</span><br><span class="line">    <span class="built_in">print</span>(r.mget(<span class="string">&quot;a&quot;</span>, <span class="string">&#x27;b&#x27;</span>))</span><br><span class="line">    r.incrby(<span class="string">&#x27;a&#x27;</span>, <span class="number">10</span>)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">list_cmd</span>():</span><br><span class="line">    <span class="comment"># r.lpush(&quot;mylist&quot;,1,2,3,4,5) # 添加值</span></span><br><span class="line">    <span class="built_in">print</span>(r.lrange(<span class="string">&#x27;mylist&#x27;</span>, <span class="number">0</span>, -<span class="number">1</span>))</span><br><span class="line"></span><br><span class="line">    r.lpop(<span class="string">&#x27;mylist&#x27;</span>)  <span class="comment"># 删除第一个</span></span><br><span class="line">    <span class="built_in">print</span>(r.llen(<span class="string">&#x27;mylist&#x27;</span>))</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27; 哈 希 表 &#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="comment"># 哈希类型操作</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">hash_cmd</span>():</span><br><span class="line">    <span class="comment"># r.hset(&quot;myhash&quot;,&quot;name&quot;,&quot;张三&quot;)</span></span><br><span class="line">    <span class="comment"># r.hset(&quot;myhash&quot;,mapping=&#123;&quot;age&quot;:10,&quot;score&quot;:8.8&#125;)</span></span><br><span class="line"></span><br><span class="line">    res = r.hget(<span class="string">&#x27;myhash&#x27;</span>, <span class="string">&quot;name&quot;</span>)</span><br><span class="line">    <span class="built_in">print</span>(res.decode())</span><br><span class="line"></span><br><span class="line">    res = r.hgetall(<span class="string">&#x27;myhash&#x27;</span>)</span><br><span class="line">    <span class="built_in">print</span>(res)</span><br><span class="line"></span><br><span class="line">    r.hdel(<span class="string">&quot;myhash&quot;</span>, <span class="string">&quot;sex&quot;</span>)  <span class="comment"># 删除一个键值对</span></span><br><span class="line"></span><br><span class="line"><span class="string">&#x27;&#x27;&#x27; 集合 &#x27;&#x27;&#x27;</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">set_cmd</span>():</span><br><span class="line">    <span class="comment"># r.sadd(&quot;武将&quot;,&quot;张飞&quot;,&quot;赵云&quot;,&quot;周瑜&quot;,&quot;马超&quot;)</span></span><br><span class="line">    <span class="comment"># r.sadd(&quot;文臣&quot;,&quot;诸葛亮&quot;,&quot;周瑜&quot;,&quot;司马懿&quot;,&quot;郭嘉&quot;)</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 返回一个集合</span></span><br><span class="line">    <span class="built_in">print</span>(r.smembers(<span class="string">&quot;武将&quot;</span>))</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 求交集  并集</span></span><br><span class="line">    <span class="built_in">print</span>(&#123;i.decode() <span class="keyword">for</span> i <span class="keyword">in</span> r.sinter(<span class="string">&quot;武将&quot;</span>, <span class="string">&quot;文臣&quot;</span>)&#125;)</span><br><span class="line">    <span class="built_in">print</span>(&#123;i.decode() <span class="keyword">for</span> i <span class="keyword">in</span> r.sunion(<span class="string">&quot;武将&quot;</span>, <span class="string">&quot;文臣&quot;</span>)&#125;)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="comment"># 有序集合</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">sortedset_cmd</span>():</span><br><span class="line">    <span class="comment"># r.zadd(&quot;starset1&quot;,&#123;&quot;霍元甲&quot;:10,&quot;陈真&quot;:9&#125;)</span></span><br><span class="line">    <span class="comment"># r.zadd(&quot;starset2&quot;,&#123;&quot;李小龙&quot;:9.5,&quot;陈真&quot;:9&#125;)</span></span><br><span class="line"></span><br><span class="line">    res = r.zrange(<span class="string">&quot;starset1&quot;</span>, <span class="number">0</span>, -<span class="number">1</span>, withscores=<span class="literal">True</span>)</span><br><span class="line">    <span class="comment"># 字典推导式  [(xx,8),()]</span></span><br><span class="line">    <span class="built_in">print</span>(&#123;k.decode(): <span class="built_in">float</span>(v) <span class="keyword">for</span> k, v <span class="keyword">in</span> res&#125;)</span><br><span class="line"></span><br><span class="line">    <span class="comment"># ZUNIONSTORE  newset  2   set1  set2  weights  0.6  0.8  aggregate  max</span></span><br><span class="line">    res = r.zunionstore(<span class="string">&quot;newset1&quot;</span>, &#123;<span class="string">&quot;starset1&quot;</span>: <span class="number">0.6</span>, <span class="string">&quot;starset2&quot;</span>: <span class="number">0.8</span>&#125;, aggregate=<span class="string">&quot;MAX&quot;</span>)</span><br><span class="line">    <span class="built_in">print</span>(res)  <span class="comment"># 新集合元素数量</span></span><br><span class="line">    res = r.zrange(<span class="string">&quot;newset1&quot;</span>, <span class="number">0</span>, -<span class="number">1</span>, withscores=<span class="literal">True</span>)</span><br><span class="line">    <span class="built_in">print</span>(&#123;k.decode(): <span class="built_in">float</span>(v) <span class="keyword">for</span> k, v <span class="keyword">in</span> res&#125;)</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">&#x27;__main__&#x27;</span>:</span><br><span class="line">    <span class="comment"># 连接数据库 host  port  db  password  charset</span></span><br><span class="line">    r = redis.Redis(</span><br><span class="line">        host=<span class="string">&#x27;192.168.227.137&#x27;</span>,</span><br><span class="line">        port=<span class="number">6379</span>,</span><br><span class="line">        db=<span class="number">0</span></span><br><span class="line">    )</span><br><span class="line"></span><br><span class="line">    <span class="comment"># 数据操作  命令-》方法   命令参数-》方法参数</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 通用指令</span></span><br><span class="line">    <span class="comment"># generic()</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 字符串指令</span></span><br><span class="line">    <span class="comment"># string()</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 列表指令</span></span><br><span class="line">    <span class="comment"># list_cmd()</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 哈希操作</span></span><br><span class="line">    <span class="comment"># hash_cmd()</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 集合类型</span></span><br><span class="line">    <span class="comment"># set_cmd()</span></span><br><span class="line"></span><br><span class="line">    <span class="comment"># 有续集和</span></span><br><span class="line">    <span class="comment"># sortedset_cmd()</span></span><br><span class="line"></span><br><span class="line">    <span class="built_in">print</span>(<span class="string">&#x27;操作完成&#x27;</span>)</span><br><span class="line">    <span class="comment"># 关闭连接</span></span><br><span class="line">    r.close()</span><br></pre></td></tr></table></figure>
