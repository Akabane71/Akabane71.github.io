<figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;github.com/antchfx/htmlquery&quot;</span></span><br><span class="line">	<span class="string">&quot;io/ioutil&quot;</span></span><br><span class="line">	<span class="string">&quot;net/http&quot;</span></span><br><span class="line">	<span class="string">&quot;strings&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">	豆瓣 top  爬取</span></span><br><span class="line"><span class="comment">	目标:</span></span><br><span class="line"><span class="comment">		1. 获取表单名称，评价分数，评论人数</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">	总结:</span></span><br><span class="line"><span class="comment">		1. go 无官方的 xpath库</span></span><br><span class="line"><span class="comment">		2. go 的http请求很原始</span></span><br><span class="line"><span class="comment">		3. github.com/antchfx/htmlquery 能用,但没python的 lxml 库爽</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">get_html_string</span><span class="params">()</span></span> <span class="type">string</span> &#123;</span><br><span class="line">	url := <span class="string">&quot;https://movie.douban.com/top250&quot;</span></span><br><span class="line"></span><br><span class="line">	<span class="comment">// 创建一个新的 http 请求, 方式为 GET</span></span><br><span class="line">	req, err := http.NewRequest(http.MethodGet, url, <span class="literal">nil</span>)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(err)</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">// 设置 自定义 header</span></span><br><span class="line">	req.Header.Set(<span class="string">&quot;User-Agent&quot;</span>, <span class="string">&quot;Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/127.0.0.0 Safari/537.36&quot;</span>)</span><br><span class="line"></span><br><span class="line">	<span class="comment">// 发起请求</span></span><br><span class="line">	client := &amp;http.Client&#123;&#125;</span><br><span class="line">	resp, err := client.Do(req)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(err)</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="keyword">defer</span> resp.Body.Close()</span><br><span class="line"></span><br><span class="line">	<span class="comment">// 检验状态响应码</span></span><br><span class="line">	<span class="keyword">if</span> resp.StatusCode != http.StatusOK &#123;</span><br><span class="line">		fmt.Printf(<span class="string">&quot;status code error: %d %s&quot;</span>, resp.StatusCode, resp.Status)</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="comment">// 读取响应内容</span></span><br><span class="line">	body, err := ioutil.ReadAll(resp.Body)</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(err)</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">// 打印响应内容</span></span><br><span class="line">	<span class="comment">//fmt.Printf(&quot;%s&quot;, string(body))</span></span><br><span class="line">	<span class="keyword">return</span> <span class="type">string</span>(body)</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">type</span> my_data <span class="keyword">struct</span> &#123;</span><br><span class="line">	name   <span class="type">string</span></span><br><span class="line">	people <span class="type">string</span></span><br><span class="line">	url    <span class="type">string</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">get_items_xpath</span><span class="params">(html <span class="type">string</span>)</span></span> []my_data &#123;</span><br><span class="line">	doc, err := htmlquery.Parse(strings.NewReader(html))</span><br><span class="line">	<span class="keyword">if</span> err != <span class="literal">nil</span> &#123;</span><br><span class="line">		fmt.Println(err)</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="comment">// 使用xpath查询元素</span></span><br><span class="line">	lis := htmlquery.Find(doc, <span class="string">&quot;//*[@id=&#x27;content&#x27;]/div/div[1]/ol/li&quot;</span>)</span><br><span class="line"></span><br><span class="line">	fmt.Println(<span class="built_in">len</span>(lis), lis)</span><br><span class="line">	<span class="keyword">var</span> data []my_data</span><br><span class="line">	<span class="keyword">for</span> _, li := <span class="keyword">range</span> lis &#123;</span><br><span class="line">		nameNode := htmlquery.FindOne(li, <span class="string">`./div/div[2]/div[1]/a/span[1]/text()`</span>)</span><br><span class="line">		peopleNode := htmlquery.FindOne(li, <span class="string">`./div/div[2]/div[2]/div/span[4]/text()`</span>)</span><br><span class="line">		urlNode := htmlquery.FindOne(li, <span class="string">`./div/div[2]/div[1]/a/@href`</span>)</span><br><span class="line">		name := htmlquery.InnerText(nameNode)</span><br><span class="line">		people := htmlquery.InnerText(peopleNode)</span><br><span class="line">		url := htmlquery.InnerText(urlNode)</span><br><span class="line"></span><br><span class="line">		data = <span class="built_in">append</span>(data, my_data&#123;name, people, url&#125;)</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	<span class="keyword">return</span> data</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	html_string := get_html_string()</span><br><span class="line">	data := get_items_xpath(html_string)</span><br><span class="line">	fmt.Println(data)</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>

      e.trigger.setAttribute('aria-label', "复制成功！");
      e.clearSelection();
    })
  })
  </script>
