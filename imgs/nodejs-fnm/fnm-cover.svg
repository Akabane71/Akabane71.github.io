<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">fnm modern nodejs workflow</title>
  <desc id="desc">Illustration for using fnm with modern Node.js development workflow</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0b3b2e" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132238" />
      <stop offset="100%" stop-color="#173f33" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" />
  <circle cx="1050" cy="120" r="180" fill="#22c55e" opacity="0.12" />
  <circle cx="140" cy="620" r="220" fill="#38bdf8" opacity="0.08" />

  <rect x="72" y="76" width="1056" height="568" rx="32" fill="url(#panel)" stroke="#355270" stroke-width="2" filter="url(#shadow)" />

  <text x="116" y="160" fill="#e2e8f0" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700">fnm + Modern Node.js</text>
  <text x="116" y="205" fill="#94a3b8" font-size="24" font-family="Segoe UI, Arial, sans-serif">Fast version switching, auto use on cd, clean project startup</text>

  <rect x="116" y="258" width="284" height="238" rx="24" fill="#0b1220" stroke="#1e293b" />
  <text x="146" y="308" fill="#34d399" font-size="28" font-family="Consolas, monospace">Terminal</text>
  <text x="146" y="358" fill="#e2e8f0" font-size="22" font-family="Consolas, monospace">&gt; fnm install --lts</text>
  <text x="146" y="396" fill="#e2e8f0" font-size="22" font-family="Consolas, monospace">&gt; fnm default 22</text>
  <text x="146" y="434" fill="#e2e8f0" font-size="22" font-family="Consolas, monospace">&gt; corepack enable</text>
  <text x="146" y="472" fill="#e2e8f0" font-size="22" font-family="Consolas, monospace">&gt; npm run dev</text>

  <rect x="466" y="258" width="246" height="108" rx="22" fill="#0f172a" stroke="#355270" />
  <text x="492" y="305" fill="#e2e8f0" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">.node-version</text>
  <text x="492" y="338" fill="#34d399" font-size="36" font-family="Consolas, monospace">22</text>

  <rect x="466" y="388" width="246" height="108" rx="22" fill="#0f172a" stroke="#355270" />
  <text x="492" y="435" fill="#e2e8f0" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">corepack</text>
  <text x="492" y="468" fill="#94a3b8" font-size="22" font-family="Segoe UI, Arial, sans-serif">pnpm / yarn / npm</text>

  <rect x="782" y="258" width="260" height="238" rx="24" fill="#0b1220" stroke="#1e293b" />
  <text x="812" y="308" fill="#22c55e" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Project flow</text>
  <text x="812" y="360" fill="#e2e8f0" font-size="22" font-family="Segoe UI, Arial, sans-serif">1. cd into project</text>
  <text x="812" y="398" fill="#e2e8f0" font-size="22" font-family="Segoe UI, Arial, sans-serif">2. fnm auto switches Node</text>
  <text x="812" y="436" fill="#e2e8f0" font-size="22" font-family="Segoe UI, Arial, sans-serif">3. run dev script</text>
  <text x="812" y="474" fill="#e2e8f0" font-size="22" font-family="Segoe UI, Arial, sans-serif">4. start coding</text>

  <path d="M400 377 C430 377, 440 377, 466 312" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" />
  <path d="M712 312 C740 312, 752 312, 782 312" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" />
  <path d="M712 442 C740 442, 752 442, 782 442" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" />

  <circle cx="432" cy="377" r="10" fill="#34d399" />
  <circle cx="748" cy="312" r="10" fill="#34d399" />
  <circle cx="748" cy="442" r="10" fill="#34d399" />

  <rect x="116" y="548" width="926" height="54" rx="16" fill="#0b1220" stroke="#22324a" />
  <text x="146" y="584" fill="#cbd5e1" font-size="24" font-family="Segoe UI, Arial, sans-serif">Recommended for Vite, Next.js, tooling projects, scripts, and multi-version local development.</text>
</svg>